<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>HOD — Hotsko of the Day</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Barlow+Condensed:wght@500;600;700&family=Anton&family=JetBrains+Mono:wght@400;500;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="styles/hod-tokens.css"/>

<style>
  html, body {
    background: #050605;
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    padding: 20px;
  }
  .hod-stage {
    position: relative;
  }
  .hod-stage-bg {
    position: fixed; inset: 0;
    pointer-events: none;
    background-image:
      radial-gradient(circle at 30% 20%, rgba(132,204,22,0.05), transparent 50%),
      radial-gradient(circle at 70% 80%, rgba(132,204,22,0.03), transparent 50%);
  }
  .hod-stage-meta {
    position: fixed;
    top: 20px; left: 20px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: #525852;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    line-height: 1.5;
  }
  .hod-stage-meta b { color: #a3e635; font-weight: 400; }
  .hod-stage-notes {
    position: fixed;
    bottom: 20px; left: 20px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: #525852;
    letter-spacing: 0.14em;
    line-height: 1.8;
    max-width: 320px;
  }
  .hod-stage-notes .k { color: #a3e635; }
</style>

<!-- React + Babel -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<!-- HOD components -->
<script type="text/babel" src="components/ios-frame.jsx"></script>
<script type="text/babel" src="components/hod-atoms.jsx"></script>
<script type="text/babel" src="components/hod-generator.jsx"></script>
<script type="text/babel" src="components/hod-today.jsx"></script>
<script type="text/babel" src="components/hod-generate.jsx"></script>
<script type="text/babel" src="components/hod-live.jsx"></script>
<script type="text/babel" src="components/hod-flow.jsx"></script>
<script type="text/babel" src="components/hod-complete.jsx"></script>
<script type="text/babel" src="components/hod-tweaks.jsx"></script>
</head>
<body>

<div class="hod-stage-bg"></div>

<div class="hod-stage-meta">
  HOD · HOTSKO OF THE DAY<br/>
  <b>CONCEPT DIRECTION</b> · HI-FI PROTOTYPE<br/>
  GARAGE GYM · MIL-SPEC · PHOSPHOR
</div>

<div class="hod-stage-notes">
  <span class="k">▸</span> TAP <b style="color:#a3e635">BEGIN HOD</b> TO SEE STAMP-LOCK<br/>
  <span class="k">▸</span> LIVE MODE ADAPTS PER FORMAT<br/>
  <span class="k">▸</span> TOGGLE <b style="color:#a3e635">TWEAKS</b> FOR COLOR/TYPE/LAYOUT<br/>
  <span class="k">▸</span> REFRESH PERSISTS SCREEN
</div>

<div id="root"></div>

<script type="text/babel" data-presets="react">
const { useState, useEffect } = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accent": "bone",
  "display": "oswald",
  "liveLayout": "adaptive",
  "todayMood": "briefing"
}/*EDITMODE-END*/;

// Accent mapping — rewrites the --phos-* tokens
const ACCENTS = {
  hazard: { a500: '#84cc16', a400: '#a3e635', a300: '#bef264', glow: 'rgba(132,204,22,0.35)' },
  ember:  { a500: '#ff5a1f', a400: '#ff7a44', a300: '#ff9566', glow: 'rgba(255,90,31,0.35)' },
  iron:   { a500: '#dc2626', a400: '#ef4444', a300: '#f87171', glow: 'rgba(220,38,38,0.35)' },
  bone:   { a500: '#e8e6dd', a400: '#f5f3ea', a300: '#ffffff', glow: 'rgba(232,230,221,0.2)' },
};
const DISPLAY_FONTS = {
  oswald: "'Oswald','Barlow Condensed',sans-serif",
  barlow: "'Barlow Condensed','Oswald',sans-serif",
  anton:  "'Anton','Oswald','Barlow Condensed',sans-serif",
};

function applyTweaks(t) {
  const a = ACCENTS[t.accent] || ACCENTS.hazard;
  document.documentElement.style.setProperty('--phos-500', a.a500);
  document.documentElement.style.setProperty('--phos-400', a.a400);
  document.documentElement.style.setProperty('--phos-300', a.a300);
  document.documentElement.style.setProperty('--phos-glow', a.glow);
  document.documentElement.style.setProperty('--f-display', DISPLAY_FONTS[t.display] || DISPLAY_FONTS.oswald);
}

function HODApp() {
  // Persist current screen in localStorage
  const [screen, setScreen] = useState(() => {
    try { return localStorage.getItem('hod.screen') || 'today'; } catch { return 'today'; }
  });
  const [config, setConfig] = useState(null);
  const [tweaks, setTweaks] = useState(TWEAK_DEFAULTS);

  useEffect(() => applyTweaks(tweaks), [tweaks]);
  useEffect(() => {
    try { localStorage.setItem('hod.screen', screen); } catch {}
  }, [screen]);

  // Ensure we have config for non-today screens on refresh
  useEffect(() => {
    if (screen !== 'today' && !config) {
      setConfig({
        intensity: 'HARD', style: 'CROSSFIT', duration: 30,
        workout: generateHOD({ intensity: 'HARD', style: 'CROSSFIT', duration: 30 }),
      });
    }
  }, []);

  const go = (s) => setScreen(s);

  return (
    <div data-screen-label={screen}>
      <IOSDevice dark={true} width={402} height={874}>
        {screen === 'today' && (
          <TodayScreen
            tweaks={tweaks}
            onStart={(cfg) => { setConfig(cfg); go('warmup'); }}
          />
        )}
        {screen === 'warmup' && config && (
          <WarmupScreen
            config={config}
            onDone={() => go('generate')}
            onSkip={() => go('generate')}
          />
        )}
        {screen === 'generate' && config && (
          <GenerateScreen
            config={config}
            onReady={() => go('live')}
          />
        )}
        {screen === 'live' && config && (
          <LiveScreen
            config={config}
            variant={tweaks.liveLayout || 'adaptive'}
            onFinish={() => go(config.workout.finisher ? 'finisher' : 'complete')}
            onExit={() => go('today')}
          />
        )}
        {screen === 'finisher' && config && (
          <FinisherScreen
            config={config}
            onDone={() => go('complete')}
          />
        )}
        {screen === 'complete' && config && (
          <CompleteScreen
            config={config}
            onClose={() => { go('today'); }}
          />
        )}
      </IOSDevice>
      <TweaksPanel tweaks={tweaks} setTweaks={setTweaks} />
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<HODApp />);
</script>

</body>
</html>
